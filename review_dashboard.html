<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spyne · Review Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f172a;
    --card:     #1e293b;
    --border:   #334155;
    --text:     #f8fafc;
    --muted:    #94a3b8;
    --ok:       #10b981;
    --issue:    #f97316;
    --pending:  #8b5cf6;
    --blue:     #3b82f6;
    --red:      #ef4444;
    --yellow:   #eab308;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    background: rgba(15,23,42,.95); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: .5px; }
  .logo-sub { font-size: 11px; color: var(--muted); font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #last-updated { font-size: 11px; color: var(--muted); }
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--border); border: none; color: var(--text);
    padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .refresh-btn:hover { background: #475569; }
  .refresh-btn.loading svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Layout ── */
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

  /* ── KPI Cards ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 32px; }
  .kpi-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent, var(--blue));
  }
  .kpi-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .kpi-value { font-size: 34px; font-weight: 800; line-height: 1; margin-bottom: 6px; color: var(--accent, var(--text)); }
  .kpi-sub { font-size: 11px; color: var(--muted); }
  .kpi-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .kpi-bar-fill { height: 100%; background: var(--accent, var(--blue)); border-radius: 2px; transition: width 1s ease; }

  /* ── Charts Row ── */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 32px; }
  .chart-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px;
  }
  .chart-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 18px; }

  /* Issue donut */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-svg { flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-val { font-weight: 700; font-size: 12px; }
  .legend-pct { color: var(--muted); font-size: 10px; }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: 110px 1fr 48px; align-items: center; gap: 10px; }
  .bar-name { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .bar-val { font-size: 11px; font-weight: 700; text-align: right; }

  /* Trend sparkline */
  .trend-wrap { position: relative; }
  .trend-svg { width: 100%; height: 120px; }

  /* ── Tables ── */
  .tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 32px; }
  .table-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden;
  }
  .table-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
  .table-header .chart-title { margin: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 10px 16px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 11px 16px; border-bottom: 1px solid rgba(51,65,85,.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.03); }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-ok { background: rgba(16,185,129,.15); color: var(--ok); }
  .badge-issue { background: rgba(249,115,22,.15); color: var(--issue); }
  .badge-pending { background: rgba(139,92,246,.15); color: var(--pending); }

  /* ── Rooftop progress rings ── */
  .rooftop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .rooftop-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; text-align: center; transition: border-color .2s;
  }
  .rooftop-card:hover { border-color: var(--blue); }
  .ring-wrap { position: relative; width: 80px; height: 80px; margin: 0 auto 12px; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
  .ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.2s ease; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-pct { font-size: 16px; font-weight: 800; line-height: 1; }
  .ring-label { font-size: 8px; color: var(--muted); font-weight: 600; letter-spacing: .5px; }
  .rooftop-name { font-size: 11px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rooftop-count { font-size: 10px; color: var(--muted); }

  /* ── Recent activity ── */
  .activity-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; margin-bottom: 32px;
  }
  .activity-row { display: grid; grid-template-columns: 140px 1fr 100px 80px 120px; gap: 12px; padding: 10px 20px; border-bottom: 1px solid rgba(51,65,85,.4); align-items: center; font-size: 11px; }
  .activity-row:last-child { border-bottom: none; }
  .activity-row:hover { background: rgba(255,255,255,.02); }
  .activity-head { background: rgba(51,65,85,.3); font-size: 10px; font-weight: 700; letter-spacing: .8px; color: var(--muted); text-transform: uppercase; }
  .vin-mono { font-family: monospace; font-size: 11px; color: var(--blue); }

  /* ── Loading ── */
  .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
  .loading-text { color: var(--muted); font-size: 13px; }
  .error-msg { color: var(--issue); font-size: 13px; text-align: center; padding: 40px; }

  /* ── Responsive ── */
  @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } .charts-row { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 768px) { main { padding: 16px; } .kpi-grid { grid-template-columns: 1fr 1fr; } .charts-row,.tables-row { grid-template-columns: 1fr; } header { padding: 12px 16px; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">🏎 Spyne Review Dashboard</div>
      <div class="logo-sub">1st Image Review · All Time</div>
    </div>
  </div>
  <div class="header-right">
    <span id="last-updated">Loading…</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115.17-3.36M20 15a9 9 0 01-15.17 3.36"/></svg>
      Refresh
    </button>
  </div>
</header>

<main id="main-content">
  <div class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Fetching data from BigQuery…</div>
  </div>
</main>

<script>
const BQ = 'https://script.google.com/macros/s/AKfycbxS1D1FkX2q_wQhh4U6LbzQKAgSRwzQGr0gEpmaM1rT8Sqig7ghr54ChYe9dor3PIaG/exec';
const TBL = '`inspired-frame-453018-r2.spyne_reviews.image_reviews`';

async function query(sql) {
  const res = await fetch(BQ + '?query=' + encodeURIComponent(sql), { redirect: 'follow' });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Query failed');
  return data.rows;
}

const ISSUE_COLORS = {
  'OK': '#10b981', 'Raw': '#f97316', 'Stock': '#3b82f6', 'Bad Input': '#8b5cf6',
  'Banner': '#ec4899', 'Background': '#14b8a6', 'Quality': '#f59e0b',
  'Hero Angle': '#6366f1', 'Photo NA': '#94a3b8', 'Unsupported Vehicle': '#ef4444',
  'Pending': '#6b7280', 'Sequence': '#06b6d4', 'No exterior': '#84cc16',
  'Input Overlap': '#a78bfa',
};
function issueColor(t) { return ISSUE_COLORS[t] || '#64748b'; }

function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }

// ── Donut chart ──
function buildDonut(data, size = 130) {
  const total = data.reduce((s, d) => s + d.v, 0);
  if (!total) return '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">No data</div>';
  const r = size * 0.38, cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  let paths = '';
  data.forEach(d => {
    const frac = d.v / total;
    const dash = frac * circ;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.c}" stroke-width="${size*0.12}" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${-offset}" stroke-linecap="butt"/>`;
    offset += dash;
  });
  const legend = data.slice(0, 8).map(d =>
    `<div class="legend-item"><div class="legend-dot" style="background:${d.c}"></div><span class="legend-label">${d.l}</span><span class="legend-val">${d.v}</span><span class="legend-pct"> ${pct(d.v,total)}%</span></div>`
  ).join('');
  return `<div class="donut-wrap">
    <svg class="donut-svg" width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${size*0.12}"/>
      ${paths}
    </svg>
    <div class="donut-legend">${legend}</div>
  </div>`;
}

// ── Horizontal bar chart ──
function buildBars(data, colorFn) {
  const max = Math.max(...data.map(d => d.v), 1);
  return `<div class="bar-chart">${data.map(d => `
    <div class="bar-row">
      <span class="bar-name" title="${d.l}">${d.l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct(d.v,max)}%;background:${colorFn(d.l)}"></div></div>
      <span class="bar-val" style="color:${colorFn(d.l)}">${d.v}</span>
    </div>`).join('')}</div>`;
}

// ── Sparkline trend ──
function buildSparkline(rows) {
  if (!rows.length) return '<div style="color:var(--muted);font-size:12px;padding:20px">No data</div>';
  const vals = rows.map(r => parseInt(r.cnt) || 0);
  const max = Math.max(...vals, 1);
  const W = 400, H = 110, pad = 10;
  const xStep = (W - pad*2) / Math.max(vals.length - 1, 1);
  const pts = vals.map((v, i) => `${pad + i * xStep},${H - pad - (v / max) * (H - pad * 2)}`);
  const area = `M${pts[0]} ` + pts.slice(1).map(p => `L${p}`).join(' ') + ` L${pts[pts.length-1].split(',')[0]},${H-pad} L${pad},${H-pad} Z`;
  const line = `M${pts[0]} ` + pts.slice(1).map(p => `L${p}`).join(' ');
  return `<svg class="trend-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#tg)"/>
    <path d="${line}" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((p,i) => `<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="3" fill="#3b82f6"/>`).join('')}
    ${rows.slice(-5).map((r, i) => {
      const idx = rows.length - 5 + i;
      const x = pad + idx * xStep;
      const y = H - pad - (vals[idx] / max) * (H - pad * 2);
      return `<text x="${x}" y="${y-8}" font-size="9" fill="var(--muted)" text-anchor="middle">${vals[idx]}</text>`;
    }).join('')}
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);padding:4px ${pad}px 0">
    ${rows.length <= 7 ? rows.map(r => `<span>${r.review_date ? r.review_date.slice(5) : r.d || ''}</span>`).join('') : `<span>${rows[0].review_date||''}</span><span>${rows[rows.length-1].review_date||''}</span>`}
  </div>`;
}

// ── Progress ring ──
function buildRing(pctVal, color) {
  const r = 31, circ = 2 * Math.PI * r;
  const dash = (pctVal / 100) * circ;
  const col = pctVal >= 80 ? '#10b981' : pctVal >= 50 ? '#f59e0b' : '#f97316';
  return `<div class="ring-wrap">
    <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
      <circle class="ring-bg" cx="40" cy="40" r="${r}"/>
      <circle class="ring-fill" cx="40" cy="40" r="${r}" stroke="${col}"
        stroke-dasharray="${dash} ${circ}" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <span class="ring-pct" style="color:${col}">${pctVal}%</span>
      <span class="ring-label">OK</span>
    </div>
  </div>`;
}

// ── Main render ──
async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');

  try {
    const [overallR, issuesR, reviewersR, rooftopsR, trendR, recentR, conditionR] = await Promise.all([
      query(`SELECT COUNT(*) as total, COUNTIF(issue_type='OK') as ok_cnt, COUNTIF(issue_type='Pending') as pending_cnt, COUNTIF(issue_type NOT IN ('OK','Pending')) as issue_cnt, COUNT(DISTINCT reviewer) as reviewer_cnt, COUNT(DISTINCT rooftop) as rooftop_cnt FROM ${TBL}`),
      query(`SELECT issue_type, COUNT(*) as cnt FROM ${TBL} GROUP BY issue_type ORDER BY cnt DESC`),
      query(`SELECT reviewer, COUNT(*) as total, COUNTIF(issue_type='OK') as ok_cnt, COUNTIF(issue_type='Pending') as pending_cnt, COUNTIF(issue_type NOT IN ('OK','Pending')) as issue_cnt, MAX(review_date) as last_date FROM ${TBL} GROUP BY reviewer ORDER BY total DESC`),
      query(`SELECT rooftop, enterprise, COUNT(*) as total, COUNTIF(issue_type='OK') as ok_cnt, COUNTIF(issue_type NOT IN ('OK','Pending')) as issue_cnt, COUNTIF(issue_type='Pending') as pending_cnt FROM ${TBL} GROUP BY rooftop, enterprise ORDER BY total DESC`),
      query(`SELECT review_date, COUNT(*) as cnt FROM ${TBL} GROUP BY review_date ORDER BY review_date`),
      query(`SELECT review_date, reviewer, rooftop, vin, issue_type, comment FROM ${TBL} WHERE issue_type != 'Pending' ORDER BY reviewed_at DESC LIMIT 20`),
      query(`SELECT condition, COUNT(*) as cnt, COUNTIF(issue_type='OK') as ok_cnt FROM ${TBL} GROUP BY condition ORDER BY cnt DESC`),
    ]);

    const ov = overallR[0];
    const total = parseInt(ov.total) || 0;
    const ok = parseInt(ov.ok_cnt) || 0;
    const pending = parseInt(ov.pending_cnt) || 0;
    const issues = parseInt(ov.issue_cnt) || 0;
    const okPct = pct(ok, total);

    const html = `
    <!-- KPIs -->
    <div class="section-label">Overview</div>
    <div class="kpi-grid">
      <div class="kpi-card" style="--accent:#3b82f6">
        <div class="kpi-label">Total Reviews</div>
        <div class="kpi-value">${total.toLocaleString()}</div>
        <div class="kpi-sub">${ov.rooftop_cnt} rooftops · ${ov.reviewer_cnt} reviewers</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:100%"></div></div>
      </div>
      <div class="kpi-card" style="--accent:#10b981">
        <div class="kpi-label">Approved (OK)</div>
        <div class="kpi-value">${ok.toLocaleString()}</div>
        <div class="kpi-sub">${okPct}% of total</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${okPct}%"></div></div>
      </div>
      <div class="kpi-card" style="--accent:#f97316">
        <div class="kpi-label">Issues Found</div>
        <div class="kpi-value">${issues.toLocaleString()}</div>
        <div class="kpi-sub">${pct(issues,total)}% of total</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct(issues,total)}%"></div></div>
      </div>
      <div class="kpi-card" style="--accent:#8b5cf6">
        <div class="kpi-label">Pending</div>
        <div class="kpi-value">${pending.toLocaleString()}</div>
        <div class="kpi-sub">${pct(pending,total)}% not reviewed</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct(pending,total)}%"></div></div>
      </div>
      <div class="kpi-card" style="--accent:#eab308">
        <div class="kpi-label">Issue Rate</div>
        <div class="kpi-value">${pct(issues, ok+issues)}%</div>
        <div class="kpi-sub">of reviewed VINs</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct(issues,ok+issues)}%"></div></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="section-label">Analysis</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Issue Breakdown</div>
        ${buildDonut(issuesR.map(r => ({ l: r.issue_type, v: parseInt(r.cnt)||0, c: issueColor(r.issue_type) })))}
      </div>
      <div class="chart-card">
        <div class="chart-title">Reviews by Date</div>
        ${buildSparkline(trendR)}
      </div>
      <div class="chart-card">
        <div class="chart-title">Condition Split</div>
        ${buildBars(conditionR.map(r => ({ l: r.condition || 'Unknown', v: parseInt(r.cnt)||0 })), () => '#3b82f6')}
        <div style="margin-top:16px"></div>
        <div class="chart-title">Top Issues (bar)</div>
        ${buildBars(issuesR.slice(0,6).map(r => ({ l: r.issue_type, v: parseInt(r.cnt)||0 })), issueColor)}
      </div>
    </div>

    <!-- Rooftop rings -->
    <div class="section-label">Rooftop Progress</div>
    <div class="rooftop-grid">
      ${rooftopsR.map(r => {
        const t = parseInt(r.total)||0, o = parseInt(r.ok_cnt)||0;
        const p = pct(o, t);
        return `<div class="rooftop-card">
          ${buildRing(p, '#10b981')}
          <div class="rooftop-name" title="${r.rooftop}">${r.rooftop || 'Unknown'}</div>
          <div class="rooftop-count">${t} VINs · ${parseInt(r.issue_cnt)||0} issues</div>
        </div>`;
      }).join('')}
    </div>

    <!-- Tables -->
    <div class="section-label">Performance</div>
    <div class="tables-row">
      <div class="table-card">
        <div class="table-header"><div class="chart-title">Reviewer Performance</div></div>
        <table>
          <thead><tr><th>Reviewer</th><th>Total</th><th>OK</th><th>Issues</th><th>Pending</th><th>Last Active</th></tr></thead>
          <tbody>${reviewersR.map(r => {
            const t = parseInt(r.total)||0, o = parseInt(r.ok_cnt)||0, i = parseInt(r.issue_cnt)||0;
            return `<tr>
              <td>${r.reviewer?.split('@')[0] || '—'}<br><span style="font-size:9px;color:var(--muted)">${r.reviewer}</span></td>
              <td><b>${t}</b></td>
              <td><span class="badge badge-ok">${o}</span></td>
              <td><span class="badge badge-issue">${i}</span></td>
              <td><span class="badge badge-pending">${parseInt(r.pending_cnt)||0}</span></td>
              <td style="color:var(--muted);font-size:10px">${r.last_date || '—'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
      <div class="table-card">
        <div class="table-header"><div class="chart-title">Rooftop Summary</div></div>
        <table>
          <thead><tr><th>Rooftop</th><th>Total</th><th>OK%</th><th>Issues</th><th>Pending</th></tr></thead>
          <tbody>${rooftopsR.map(r => {
            const t = parseInt(r.total)||0, o = parseInt(r.ok_cnt)||0, i = parseInt(r.issue_cnt)||0, p2 = parseInt(r.pending_cnt)||0;
            const op = pct(o,t);
            return `<tr>
              <td>${r.rooftop || '—'}<br><span style="font-size:9px;color:var(--muted)">${r.enterprise}</span></td>
              <td><b>${t}</b></td>
              <td><span style="color:${op>=80?'#10b981':op>=50?'#eab308':'#f97316'};font-weight:700">${op}%</span></td>
              <td><span class="badge badge-issue">${i}</span></td>
              <td><span class="badge badge-pending">${p2}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="section-label">Recent Activity (last 20 reviews with issues)</div>
    <div class="activity-card">
      <div class="activity-row activity-head">
        <span>Date</span><span>VIN</span><span>Rooftop</span><span>Issue</span><span>Reviewer</span>
      </div>
      ${recentR.map(r => `
        <div class="activity-row">
          <span style="color:var(--muted)">${r.review_date || '—'}</span>
          <span class="vin-mono">${r.vin || '—'}</span>
          <span style="font-size:10px;color:var(--muted)">${r.rooftop || '—'}</span>
          <span><span class="badge" style="background:${issueColor(r.issue_type)}22;color:${issueColor(r.issue_type)}">${r.issue_type}</span></span>
          <span style="font-size:10px;color:var(--muted)">${r.reviewer?.split('@')[0] || '—'}</span>
        </div>`).join('')}
    </div>`;

    document.getElementById('main-content').innerHTML = html;
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById('main-content').innerHTML = `<div class="error-msg">⚠ Failed to load: ${err.message}</div>`;
  }
  btn.classList.remove('loading');
}

loadAll();
</script>
</body>
</html>
